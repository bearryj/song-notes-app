<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Song Notes</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Folder View -->
    <div id="folder-view" class="view active">
      <div class="nav-bar">
        <h1 class="nav-title">Folders</h1>
        <button id="new-folder-btn" class="nav-btn nav-btn-primary">+</button>
      </div>
      <div id="folder-list" class="list"></div>
    </div>

    <!-- Song List View -->
    <div id="song-list-view" class="view">
      <div class="nav-bar">
        <button id="back-to-folders" class="nav-btn">‹</button>
        <h1 id="folder-title" class="nav-title">All Songs</h1>
        <button id="view-toggle" class="nav-btn" title="Toggle view">⊞</button>
        <button id="import-btn" class="nav-btn">↓</button>
        <button id="new-song-btn" class="nav-btn nav-btn-primary">+</button>
      </div>
      <div class="search-bar">
        <input type="search" id="search-input" placeholder="Search" />
      </div>
      <div id="song-list" class="list"></div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="view">
      <div class="nav-bar editor-nav">
        <button id="back-to-songs" class="nav-btn">‹</button>
        <div class="nav-title-wrap">
          <span id="auto-save-dot" class="save-dot"></span>
          <input type="text" id="song-title" class="nav-title-input" placeholder="Untitled" />
        </div>
        <div class="nav-btn-group">
          <button id="theme-toggle" class="nav-btn" title="Toggle theme">☀️</button>
          <button id="info-btn" class="nav-btn" title="Info">ℹ</button>
          <button id="undo-btn" class="nav-btn" disabled>↶</button>
          <button id="save-btn" class="nav-btn nav-btn-primary" disabled>Done</button>
        </div>
      </div>
      <div id="song-body" class="editor-body"></div>
      <div id="info-bar" class="info-bar" style="display:none;"></div>
      <div class="bottom-bar">
        <button id="record-btn" class="bar-btn" title="Record">●</button>
        <button id="recordings-btn" class="bar-btn" title="Recordings" style="display:none">▸</button>
        <span class="bar-spacer"></span>
        <button id="transpose-down-btn" class="bar-btn" title="Transpose down">♭</button>
        <button id="transpose-up-btn" class="bar-btn" title="Transpose up">♯</button>
        <span class="bar-spacer"></span>
        <button id="add-section-btn" class="bar-btn" title="Add section">+ Section</button>
        <button id="toolbar-more-btn" class="bar-btn" title="More">⋯</button>
      </div>
    </div>

    <!-- More Menu Popover -->
    <div id="more-menu" class="popover" style="display:none;">
      <button data-action="set-key">Set Key: —</button>
      <button data-action="import-txt">Import Text</button>
      <button data-action="export-txt">Export Text</button>
      <button data-action="export-md">Export Markdown</button>
      <button data-action="export-clip">Copy to Clipboard</button>
      <button data-action="delete" class="danger">Delete Song</button>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="side-panel" style="display:none;">
      <div class="side-panel-header">
        <span>History</span>
        <button id="close-hist" class="nav-btn">✕</button>
      </div>
      <div id="hist-list" class="side-panel-body"></div>
    </div>

    <!-- Recordings Popover -->
    <div id="recordings-dropdown" class="popover" style="display:none;">
      <div class="rec-dropdown-header">Recordings</div>
      <div id="rec-list"></div>
      <button id="delete-all-recordings" class="danger" style="display:block;width:100%;text-align:left;">Delete All</button>
    </div>

    <!-- Folder Actions Popover -->
    <div id="folder-actions" class="popover" style="display:none;">
      <button data-action="rename">Rename</button>
      <button data-action="delete-folder" class="danger">Delete</button>
    </div>
  </div>

  <template id="section-template">
    <div class="song-section">
      <div class="section-header">
        <select class="section-type">
          <option value="Verse">Verse</option>
          <option value="Verse 2">Verse 2</option>
          <option value="Chorus" selected>Chorus</option>
          <option value="Pre-Chorus">Pre-Chorus</option>
          <option value="Bridge">Bridge</option>
          <option value="Outro">Outro</option>
          <option value="Intro">Intro</option>
        </select>
        <span class="section-controls">
          <button class="move-up" title="Move up">▲</button>
          <button class="move-down" title="Move down">▼</button>
          <button class="duplicate-section" title="Duplicate">⧉</button>
          <button class="delete-section" title="Delete">✕</button>
        </span>
      </div>
      <div class="section-editor"></div>
    </div>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
