<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Song Notes</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Folder View -->
    <div id="folder-view" class="view active">
      <div class="nav-bar">
        <h1 class="nav-title">Folders</h1>
        <button id="new-folder-btn" class="nav-btn nav-btn-primary">+</button>
      </div>
      <div id="folder-list" class="list"></div>
    </div>

    <!-- Song List View -->
    <div id="song-list-view" class="view">
      <div class="nav-bar">
        <button id="back-to-folders" class="nav-btn">‹</button>
        <h1 id="folder-title" class="nav-title">All Songs</h1>
        <button id="view-toggle" class="nav-btn" title="Toggle view">⊞</button>
        <button id="import-btn" class="nav-btn">↓</button>
        <button id="new-song-btn" class="nav-btn nav-btn-primary">+</button>
      </div>
      <div class="search-bar">
        <input type="search" id="search-input" placeholder="Search" />
      </div>
      <div id="tag-filter-bar" class="tag-filter-bar" style="display:none;"></div>
      <div id="song-list" class="list"></div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="view">
      <div class="nav-bar editor-nav">
        <button id="back-to-songs" class="nav-btn">‹</button>
        <div class="nav-title-wrap">
          <span id="auto-save-dot" class="save-dot"></span>
          <input type="text" id="song-title" class="nav-title-input" placeholder="Untitled" />
        </div>
        <div class="nav-btn-group">
          <button id="theme-toggle" class="nav-btn" title="Toggle theme">☀️</button>
          <button id="info-btn" class="nav-btn" title="Info">ℹ</button>
          <button id="undo-btn" class="nav-btn" disabled>↶</button>
          <button id="save-btn" class="nav-btn nav-btn-primary" disabled>Done</button>
        </div>
      </div>
      <div id="song-body" class="editor-body"></div>
      <div id="info-bar" class="info-bar" style="display:none;"></div>

      <!-- Mobile Toolbar -->
      <div class="mobile-toolbar" id="mobile-toolbar">
        <!-- Primary actions row -->
        <div class="toolbar-primary">
          <button id="record-btn" class="toolbar-btn" title="Record">
            <span class="toolbar-icon">●</span>
            <span class="toolbar-label">Record</span>
          </button>
          <button id="recordings-btn" class="toolbar-btn" title="Recordings" style="display:none">
            <span class="toolbar-icon">▸</span>
            <span class="toolbar-label">Takes</span>
          </button>
          <div class="toolbar-divider"></div>
          <button id="transpose-down-btn" class="toolbar-btn toolbar-btn-sm" title="Transpose down">
            <span class="toolbar-icon">♭</span>
          </button>
          <button id="transpose-up-btn" class="toolbar-btn toolbar-btn-sm" title="Transpose up">
            <span class="toolbar-icon">♯</span>
          </button>
          <div class="toolbar-divider"></div>
          <button id="add-section-btn" class="toolbar-btn" title="Add section">
            <span class="toolbar-icon">+</span>
            <span class="toolbar-label">Section</span>
          </button>
          <button id="toolbar-more-btn" class="toolbar-btn" title="More tools">
            <span class="toolbar-icon">⋯</span>
            <span class="toolbar-label">More</span>
          </button>
        </div>
      </div>

      <!-- Toolbar Bottom Sheet -->
      <div id="toolbar-sheet" style="display:none;">
        <div class="toolbar-sheet-backdrop"></div>
        <div class="toolbar-sheet-content">
          <div class="toolbar-sheet-handle"></div>
          <div class="toolbar-sheet-grid">
            <button class="toolbar-sheet-btn" data-action="set-key">
              <span class="sheet-icon">🎵</span>
              <span class="sheet-label">Set Key</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="set-bpm">
              <span class="sheet-icon">⏱</span>
              <span class="sheet-label">Set BPM</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="import-txt">
              <span class="sheet-icon">↓</span>
              <span class="sheet-label">Import Text</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="export-txt">
              <span class="sheet-icon">↑</span>
              <span class="sheet-label">Export Text</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="export-md">
              <span class="sheet-icon">M↓</span>
              <span class="sheet-label">Export MD</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="export-clip">
              <span class="sheet-icon">⎘</span>
              <span class="sheet-label">Copy</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="history">
              <span class="sheet-icon">↶</span>
              <span class="sheet-label">History</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="delete">
              <span class="sheet-icon">🗑</span>
              <span class="sheet-label">Delete</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="setlist">
              <span class="sheet-icon">📋</span>
              <span class="sheet-label">Setlists</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="chord-diagram">
              <span class="sheet-icon">🎸</span>
              <span class="sheet-label">Chord Diagram</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="share-song">
              <span class="sheet-icon">↗</span>
              <span class="sheet-label">Share</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="plugins">
              <span class="sheet-icon">⚙</span>
              <span class="sheet-label">Export Plugins</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="metronome">
              <span class="sheet-icon">⏱</span>
              <span class="sheet-label">Metronome</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="song-stats">
              <span class="sheet-icon">📊</span>
              <span class="sheet-label">Song Stats</span>
            </button>
            <button class="toolbar-sheet-btn" data-action="edit-tags">
              <span class="sheet-icon">🏷</span>
              <span class="sheet-label">Tags</span>
            </button>
          </div>
        </div>
      </div>

      <!-- FAB (shown when toolbar collapsed) -->
      <button id="toolbar-fab" class="toolbar-fab" style="display:none;" title="Show tools">
        <span class="fab-icon">⚙</span>
      </button>
    </div>

    <!-- More Menu Popover -->
    <div id="more-menu" class="popover" style="display:none;">
      <button data-action="set-key">Set Key: —</button>
      <button data-action="import-txt">Import Text</button>
      <button data-action="export-txt">Export Text</button>
      <button data-action="export-md">Export Markdown</button>
      <button data-action="export-clip">Copy to Clipboard</button>
      <button data-action="delete" class="danger">Delete Song</button>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="side-panel" style="display:none;">
      <div class="side-panel-header">
        <span>History</span>
        <button id="close-hist" class="nav-btn">✕</button>
      </div>
      <div id="hist-list" class="side-panel-body"></div>
    </div>

    <!-- Recordings Popover -->
    <div id="recordings-dropdown" class="popover" style="display:none;">
      <div class="rec-dropdown-header">Recordings</div>
      <div id="rec-list"></div>
      <button id="delete-all-recordings" class="danger" style="display:block;width:100%;text-align:left;">Delete All</button>
    </div>

    <!-- Folder Actions Popover -->
    <div id="folder-actions" class="popover" style="display:none;">
      <button data-action="rename">Rename</button>
      <button data-action="delete-folder" class="danger">Delete</button>
    </div>

    <!-- Setlist View -->
    <div id="setlist-view" class="view">
      <div class="nav-bar">
        <button id="back-from-setlist" class="nav-btn">‹</button>
        <h1 class="nav-title">Setlists</h1>
        <button id="setlist-new-btn" class="nav-btn nav-btn-primary">+</button>
      </div>
      <div id="setlist-list" class="list"></div>
    </div>

    <!-- Setlist Detail View (song list within a setlist) -->
    <div id="setlist-detail-view" class="view">
      <div class="nav-bar">
        <button id="back-from-setlist-detail" class="nav-btn">‹</button>
        <div class="nav-title-wrap">
          <h1 id="setlist-detail-title" class="nav-title">Setlist</h1>
        </div>
        <div class="nav-btn-group">
          <button id="setlist-print-btn" class="nav-btn" title="Print chord charts">🖨</button>
          <button id="setlist-transpose-btn" class="nav-btn" title="Transpose all">♯</button>
          <button id="setlist-add-song-btn" class="nav-btn nav-btn-primary">+</button>
        </div>
      </div>
      <div class="search-bar">
        <span id="setlist-song-count" style="font-size:13px;color:var(--fg-tertiary);padding:0 4px;">0 songs</span>
      </div>
      <div id="setlist-songs" class="list"></div>
    </div>

    <!-- Song Picker Sheet (for adding songs to setlist) -->
    <div id="song-picker-sheet" style="display:none;">
      <div class="toolbar-sheet-backdrop"></div>
      <div class="toolbar-sheet-content" style="max-height:70vh;">
        <div class="toolbar-sheet-handle"></div>
        <h3 style="font-size:17px;font-weight:600;padding:4px 0 12px;text-align:center;">Add Song to Setlist</h3>
        <div id="song-picker-list" style="overflow-y:auto;max-height:50vh;"></div>
      </div>
    </div>

    <!-- Setlist Print Preview Overlay -->
    <div id="setlist-print-overlay" style="display:none;">
      <div class="print-preview-nav">
        <button id="print-close-btn" class="nav-btn">✕</button>
        <span id="print-preview-title" class="print-preview-title">Print Preview</span>
        <button id="print-do-btn" class="nav-btn nav-btn-primary" style="font-size:15px;">Print</button>
      </div>
      <div id="setlist-print-content" class="print-content"></div>
    </div>

    <!-- Metronome Panel -->
    <div id="metronome-panel" style="display:none;">
      <div class="toolbar-sheet-backdrop"></div>
      <div class="metronome-content">
        <div class="toolbar-sheet-handle"></div>
        <div class="metro-header">
          <h3 class="metro-title">Metronome</h3>
        </div>
        <div class="metro-beat-display" id="metro-beat-display">
          <div class="metro-beat-circle" id="metro-beat-circle"></div>
          <div class="metro-bpm-value" id="metro-bpm-value">120</div>
          <div class="metro-bpm-label">BPM</div>
        </div>
        <div class="metro-controls">
          <button class="metro-btn metro-btn-minus" id="metro-bpm-down" title="Decrease BPM">−</button>
          <button class="metro-btn metro-btn-play" id="metro-play-btn" title="Play">▶</button>
          <button class="metro-btn metro-btn-plus" id="metro-bpm-up" title="Increase BPM">+</button>
        </div>
        <div class="metro-bpm-slider-wrap">
          <input type="range" id="metro-bpm-slider" class="metro-bpm-slider" min="30" max="240" value="120">
          <div class="metro-bpm-ticks">
            <span>30</span>
            <span>60</span>
            <span>120</span>
            <span>180</span>
            <span>240</span>
          </div>
        </div>
        <div class="metro-time-sig-wrap">
          <div class="metro-time-sig-label">Time Signature</div>
          <div class="metro-time-sig-btns">
            <button class="metro-time-btn active" data-sig="4">4/4</button>
            <button class="metro-time-btn" data-sig="3">3/4</button>
            <button class="metro-time-btn" data-sig="6">6/8</button>
            <button class="metro-time-btn" data-sig="2">2/4</button>
          </div>
        </div>
        <div class="metro-preset-wrap">
          <div class="metro-preset-label">Tempo Markings</div>
          <div class="metro-preset-grid">
            <button class="metro-preset-btn" data-bpm="60">Largo</button>
            <button class="metro-preset-btn" data-bpm="72">Adagio</button>
            <button class="metro-preset-btn" data-bpm="84">Andante</button>
            <button class="metro-preset-btn" data-bpm="100">Moderato</button>
            <button class="metro-preset-btn" data-bpm="120">Allegro</button>
            <button class="metro-preset-btn" data-bpm="144">Vivace</button>
            <button class="metro-preset-btn" data-bpm="168">Presto</button>
            <button class="metro-preset-btn" data-bpm="200">Prestissimo</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Song Statistics Panel -->
    <div id="song-stats-panel" style="display:none;">
      <div class="toolbar-sheet-backdrop"></div>
      <div class="stats-content">
        <div class="toolbar-sheet-handle"></div>
        <div class="stats-header">
          <h3 class="stats-title">Song Statistics</h3>
        </div>
        <div class="stats-body" id="stats-body">
          <div class="stats-loading">Select a song to view stats</div>
        </div>
      </div>
    </div>

    <!-- Tag Editor Panel -->
    <div id="tag-editor-panel" style="display:none;">
      <div class="toolbar-sheet-backdrop"></div>
      <div class="stats-content">
        <div class="toolbar-sheet-handle"></div>
        <div class="stats-header">
          <h3 class="stats-title">Edit Tags</h3>
        </div>
        <div class="tag-editor-body">
          <div id="tag-editor-current" class="tag-editor-section">
            <div class="tag-editor-label">Current Tags</div>
            <div id="tag-editor-chips" class="tag-chips-wrap"></div>
          </div>
          <div class="tag-editor-input-row">
            <input type="text" id="tag-editor-input" placeholder="Add a tag…" autocomplete="off" spellcheck="false" />
            <button id="tag-editor-add-btn" class="nav-btn nav-btn-primary" style="padding:6px 14px;font-size:14px;">Add</button>
          </div>
          <div id="tag-editor-suggestions" class="tag-editor-section">
            <div class="tag-editor-label">All Tags</div>
            <div id="tag-editor-all-chips" class="tag-chips-wrap"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <template id="section-template">
    <div class="song-section">
      <div class="section-header">
        <select class="section-type">
          <option value="Verse">Verse</option>
          <option value="Verse 2">Verse 2</option>
          <option value="Chorus" selected>Chorus</option>
          <option value="Pre-Chorus">Pre-Chorus</option>
          <option value="Bridge">Bridge</option>
          <option value="Outro">Outro</option>
          <option value="Intro">Intro</option>
        </select>
        <span class="section-controls">
          <button class="move-up" title="Move up">▲</button>
          <button class="move-down" title="Move down">▼</button>
          <button class="duplicate-section" title="Duplicate">⧉</button>
          <button class="delete-section" title="Delete">✕</button>
        </span>
      </div>
      <div class="section-editor"></div>
    </div>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
